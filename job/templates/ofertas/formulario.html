<!DOCTYPE html>
<html>
<head>
<title>Publicar Oferta</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<div class="max-w-2xl mx-auto mt-10 bg-white shadow-lg rounded-xl p-8">

<h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
Publicar Oferta de Trabajo
</h2>

<form method="POST" class="space-y-4">

{% csrf_token %}

<div>
<label class="block text-sm font-medium text-gray-600">Cargo</label>
{{ form.cargo }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Empresa</label>
{{ form.empresa }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Ubicación</label>
{{ form.ubicacion }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Tipo de empleo</label>
{{ form.tipo_empleo }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Descripción</label>
{{ form.descripcion }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Aptitudes</label>
{{ form.aptitudes }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Método de solicitud (email)</label>
{{ form.metodo_solicitud }}
</div>

<div class="grid grid-cols-2 gap-4">
<div>
<label class="block text-sm font-medium text-gray-600">Fecha de inicio</label>
{{ form.fecha_inicio }}
</div>

<div>
<label class="block text-sm font-medium text-gray-600">Fecha de fin</label>
{{ form.fecha_fin }}
</div>
</div>

<button type="submit" class="w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
Publicar
</button>

</form>

</div>

</body>
</html>
