<!-- ESTILOS CRÍTICOS INLINE PARA QUE SE VEA INMEDIATAMENTE -->
<style>
    /* Estilos mínimos para que se vea bien antes de que cargue Tailwind */
    .min-h-screen { min-height: 100vh; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-center { justify-content: center; }
    .bg-gray-100 { background-color: #f3f4f6; }
    .bg-white { background-color: #ffffff; }
    .p-8 { padding: 2rem; }
    .rounded-xl { border-radius: 0.75rem; }
    .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
    .w-full { width: 100%; }
    .max-w-md { max-width: 28rem; }
    .text-center { text-align: center; }
    .mb-6 { margin-bottom: 1.5rem; }
    .text-2xl { font-size: 1.5rem; }
    .font-bold { font-weight: 700; }
    .text-sm { font-size: 0.875rem; }
    .font-medium { font-weight: 500; }
    .mb-4 { margin-bottom: 1rem; }
    .space-y-4 > * + * { margin-top: 1rem; }
    .border { border-width: 1px; }
    .rounded-lg { border-radius: 0.5rem; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .py-2 { padding-top: 0.5rem; padding-bottom: 0.5rem; }
    .bg-blue-600 { background-color: #2563eb; }
    .text-white { color: #ffffff; }
    .hover\:bg-blue-700:hover { background-color: #1d4ed8; }
    .mt-4 { margin-top: 1rem; }
    .text-gray-600 { color: #4b5563; }
    .text-blue-600 { color: #2563eb; }
    .hover\:underline:hover { text-decoration: underline; }
    .bg-red-100 { background-color: #fee2e2; }
    .text-red-700 { color: #b91c1c; }
    .p-3 { padding: 0.75rem; }
    .hidden { display: none; }
</style>

<div class="min-h-screen flex items-center justify-center bg-gray-100">
    <div class="bg-white p-8 rounded-xl shadow-lg w-full max-w-md">
        
        <!-- HEADER SIMPLE -->
        <h2 class="text-2xl font-bold text-center mb-6">
            Iniciar sesión
        </h2>

        <!-- MENSAJE DE ERROR SIMPLE -->
        {% if error %}
        <div class="bg-red-100 text-red-700 p-3 rounded-lg text-sm mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" class="space-y-4">
            {% csrf_token %}

            <!-- CAMPO USUARIO/EMAIL -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Usuario o email
                </label>
                <input type="text"
                       name="username"
                       placeholder="usuario@email.com"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       required>
            </div>

            <!-- CAMPO CONTRASEÑA -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">
                    Contraseña
                </label>
                <input type="password"
                       name="password"
                       placeholder="••••••••"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                       required>
            </div>

            <!-- BOTÓN PRINCIPAL -->
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition-colors font-medium">
                Entrar
            </button>

            <!-- OPCIÓN RECORDAR (OPCIONAL) -->
            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center">
                    <input type="checkbox" class="rounded border-gray-300 text-blue-600 focus:ring-blue-500">
                    <span class="ml-2 text-gray-600">Recordarme</span>
                </label>
                <a href="#" class="text-blue-600 hover:underline">
                    ¿Olvidaste tu contraseña?
                </a>
            </div>
        </form>

        <!-- ENLACE REGISTRO -->
        <p class="text-center mt-6 text-sm text-gray-600">
            ¿No tienes cuenta?
            <a href="{% url 'registro' %}" class="text-blue-600 hover:underline">
                Regístrate
            </a>
        </p>
    </div>
</div>

<!-- Tailwind cargado de manera óptima -->
<script src="https://cdn.tailwindcss.com"></script>

<!-- Script mínimo para cuando cargue Tailwind -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    // Solo añadimos mejoras menores cuando Tailwind ya cargó
    setTimeout(function() {
        // Pequeña mejora visual en los inputs
        const inputs = document.querySelectorAll('input[type="text"], input[type="password"]');
        inputs.forEach(input => {
            input.classList.add('transition-shadow', 'duration-200');
        });
    }, 100);
});
</script>
