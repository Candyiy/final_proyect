<div class="bg-white rounded-lg shadow p-4 flex flex-col items-center text-center sticky top-6">

{% if request.user.foto_perfil %}
<img src="{{ request.user.foto_perfil.url }}"
class="w-24 h-24 rounded-full object-cover mb-3 border-4 border-gray-200">
{% else %}
<div class="w-24 h-24 bg-gray-300 rounded-full mb-3"></div>
{% endif %}

<h2 class="font-semibold text-lg">
{{ request.user.nombre }} {{ request.user.apellidos }}
</h2>

<p class="text-sm text-gray-500">
{{ request.user.username }}
</p>

<a href="/profile/" class="mt-3 w-full bg-blue-500 text-white py-2 rounded-lg hover:bg-blue-600 transition">
                Ver perfil
            </a>

</div>
