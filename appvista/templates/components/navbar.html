<nav class="bg-gray-900 text-white shadow">
  <div class="max-w-7xl mx-auto px-6 py-3 flex items-center justify-center gap-6">

    <!-- Logo -->
    <div class="flex items-center flex-shrink-0">
      <h1 class="font-bold text-xl">Ofertas laborales</h1>
    </div>

    <!-- Buscador centrado y más compacto -->
    <form method="GET" action="{% url 'buscar_ofertas' %}" class="flex-1 max-w-md">
      <input 
        type="text" 
        name="q"
        placeholder="Buscar ofertas..." 
        class="w-full px-3 py-2 rounded-full text-black focus:outline-none focus:ring-2 focus:ring-blue-400"
      >
    </form>

    <!-- Menú de navegación -->
    <ul class="flex gap-6">
      <li>
        <a href="/" class="hover:text-blue-400 font-medium">Inicio</a>
      </li>
        <li>
          <a href="/job/" class="hover:text-blue-400 font-medium">Mis empleos </a>
        </li>
      <li>
        <a href="/mensajes/" class="hover:text-blue-400 font-medium">Mensajes</a>
      </li>
      <li>
        <a href="/usuariolista/" class="hover:text-blue-400 font-medium">usuarios</a>
      </li>
      {% if user.is_authenticated %}

      <!-- Foto de perfil -->
      <li class="relative">

        <img 
          id="fotoPerfil"
          class="w-10 h-10 rounded-full cursor-pointer border-2 border-white"
          src="{% if user.foto_perfil %}{{ user.foto_perfil.url }}{% else %}/static/img/default.png{% endif %}"
        >

        <!-- MENÚ DESPLEGABLE -->
        <div id="menuPerfil" class="hidden absolute right-0 mt-3 w-48 bg-white text-black rounded-lg shadow-lg">

          <a href="/profile/" class="block px-4 py-2 hover:bg-gray-200">
            Ver mi perfil
          </a>


          <a href="/mis-postulaciones/" class="block px-4 py-2 hover:bg-gray-200">
            Mis postulaciones
          </a>

          {% if user.tipo_usuario == "empresa" %}
          <a href="{% url 'crear_oferta' %}" class="block px-4 py-2 hover:bg-gray-200">
            Publicar empleo
          </a>
          {% endif %}

          <a href="{% url 'logout' %}" class="block px-4 py-2 text-red-600 hover:bg-gray-200">
            Cerrar sesión
          </a>

        </div>

      </li>

      {% endif %}

    </ul>

  </div>
</nav>

<script>

const fotoPerfil = document.getElementById("fotoPerfil");
const menuPerfil = document.getElementById("menuPerfil");

if(fotoPerfil){

    fotoPerfil.addEventListener("click", function(){

        menuPerfil.classList.toggle("hidden");

    });

}

</script>
